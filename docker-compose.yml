version: '3.8'

services:
  app:
    image: node:18
    container_name: api-demo
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && node app.js"
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"